<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/img/IV.ico">
    <title>IV Congresso de Tecnologia da Informação - IFSul</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/common/header.css">
    <link rel="stylesheet" href="../../assets/css/schedule/schedule.css">
    <link rel="stylesheet" href="../../assets/css/common/footer.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <script>
        fetch('../header/index.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                ajustarNavbar();
            });

        function ajustarNavbar() {
            let path = window.location.pathname;
            let isHome = path.includes("/home/index.html") || path.endsWith("/home/");

            let navLinks = document.querySelector(".navbar-nav");

            if (!isHome) {
                let homeLink = navLinks.querySelector("a[href='#home']");
                if (homeLink) homeLink.setAttribute("href", "/src/home/index.html");

                let scheduleLink = navLinks.querySelector("a[href='#programacao']");
                if (scheduleLink) scheduleLink.setAttribute("href", "/src/programacao/index.html");

                let contatoLink = navLinks.querySelector("a[href='#contato']");
                if (contatoLink) contatoLink.closest("li").remove();

                let arenaLink = navLinks.querySelector("a[href='#arena']");
                if (arenaLink) arenaLink.setAttribute("href", "../arenagames/index.html");
            }
        }
    </script>
    <main>
        <section id="home" class="main gradient-bg">
        <div class="background-overlay"></div>

        <div class="container">
            <div class="main-content">
            <h1>Programação do Evento</h1>
            </div>
        </div>
        </section>
        <section class="schedule-section">
            <div class="container">
                <div class="schedule-wrapper">
                    <div class="month-selector">
                        <h2 class="month-title">Arena Games</h2>
                        <div class="card shadow-sm mb-5 w-200">
                            <div class="card-body">
                                <i class="bi bi-info-circle fs-3 text-primary"></i>
                                <h6 class="card-title mt-2">Informações</h6>
                                <ul class="list-group list-group-flush small">
                                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                        <span><i class="bi bi-calendar-event me-2 text-primary"></i>Data</span>
                                        <strong>9 de maio</strong>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                        <span><i class="bi bi-clock me-2 text-primary"></i>Início</span>
                                        <strong>09:00</strong>
                                    </li>
                                    <li class="list-group-item d-flex align-items-center px-0">
                                        <i class="bi bi-activity me-2 text-primary"></i>
                                        <span>Atividades durante a manhã e tarde</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="days-list">
                            <button class="day-button ">09</button>
                        </div>
                    </div>
                </div>
                <div class="events-list"></div>
            </div>
        </section>

        <div id="footer-placeholder"></div>
        <script>
            fetch('../footer/index.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        </script>
<div id="modal-container"></div>
    </main>
    
    <script src="../interactive-bubble.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="../schedule.js"></script>
</body>

</html>
